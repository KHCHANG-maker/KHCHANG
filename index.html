<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司廠區導航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 800px;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            margin-bottom: 50px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #333;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #667eea;
        }

        .card-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .card-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.3s ease;
        }

        .card-link:hover {
            opacity: 0.9;
        }

        .footer {
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏭 廠區管理系統</h1>
        <p class="subtitle">選擇您要訪問的廠區</p>

        <div class="cards">
            <!-- 台南廠 -->
            <a href="CorningTN.html" class="card">
                <div class="card-icon">🌞</div>
                <div class="card-title">台南廠</div>
                <div class="card-description">台灣南部廠區<br>南台灣營運中心</div>
                <span class="card-link">進入台南廠 →</span>
            </a>

            <!-- 台中廠 -->
            <a href="CorningTC.html" class="card">
                <div class="card-icon">🏢</div>
                <div class="card-title">台中廠</div>
                <div class="card-description">台灣中部廠區<br>中台灣營運中心</div>
                <span class="card-link">進入台中廠 →</span>
            </a>
        </div>

        <div class="footer">
            <p>© 2024 公司名稱. 版權所有</p>
        </div>
    </div>
</body>
</html>
