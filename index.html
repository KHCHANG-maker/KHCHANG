<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康寧戶外作業天氣監測系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4DA6D6;
            --primary-dark: #1e5a96;
            --primary-light: #87CEEB;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 18px;
            margin-bottom: 40px;
        }

        /* === 區塊標題 === */
        .section-title {
            color: white;
            font-size: 22px;
            font-weight: bold;
            margin: 30px 0 20px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .section-title::before,
        .section-title::after {
            content: "";
            flex: 0 1 80px;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
        }

        /* === 廠區卡片(原本的)=== */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 35px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #333;
            border-top: 5px solid var(--primary);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .card-icon {
            font-size: 55px;
            margin-bottom: 18px;
        }

        .card-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--primary-dark);
        }

        .card-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .card-link {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 11px 28px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.3s ease, transform 0.2s ease;
            font-size: 14px;
        }

        .card-link:hover {
            opacity: 0.9;
            transform: scale(1.03);
        }

        /* === 一頁式儀表板區(獨立樣式)=== */
        .dashboard-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-left: 6px solid var(--primary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .dashboard-card {
            background: linear-gradient(135deg, #f0f8ff 0%, #ffffff 100%);
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            padding: 18px 20px;
            text-decoration: none;
            color: var(--primary-dark);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }

        .dashboard-card:hover {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            transform: translateX(5px);
            box-shadow: 0 6px 20px rgba(77, 166, 214, 0.4);
            border-color: var(--primary-dark);
        }

        .dashboard-card-icon {
            font-size: 32px;
            flex-shrink: 0;
        }

        .dashboard-card-content {
            flex: 1;
        }

        .dashboard-card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .dashboard-card-desc {
            font-size: 12px;
            opacity: 0.85;
        }

        .dashboard-card-arrow {
            font-size: 20px;
            opacity: 0.7;
            flex-shrink: 0;
        }

        .dashboard-section-title {
            color: var(--primary-dark);
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .dashboard-section-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .footer {
            margin-top: 50px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .card { padding: 25px 20px; }
            .card-icon { font-size: 45px; }
            .card-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌞 戶外作業天氣監測系統</h1>
        <p class="subtitle">選擇您要訪問的廠區或檢視即時儀表板</p>

        <!-- === 廠區選擇 === -->
        <div class="section-title">🏭 廠區選擇</div>

        <div class="cards">
            <!-- 台南廠 -->
            <a href="CorningTN.html" class="card">
                <div class="card-icon">🏢</div>
                <div class="card-title">台南廠</div>
                <div class="card-description">台灣南部廠區<br>即時天氣監測</div>
                <span class="card-link">進入台南廠 →</span>
            </a>

            <!-- 台中廠 -->
            <a href="CorningTC.html" class="card">

                <span class="card-link">進入台中廠 →</span>
            </a>
        </div>

        <!-- === 一頁式儀表板區 === -->
        <div class="dashboard-section">
            <div class="dashboard-section-title">
                📊 即時氣象儀表板
            </div>
            <div class="dashboard-section-desc">
                一頁式即時資訊頁面 — 適合大螢幕監控顯示,完整顯示氣象資料、熱指數與雷達回波圖
            </div>

            <div class="dashboard-grid">
                <!-- 台南廠儀表板 -->
                <a href="OPTN.html" class="dashboard-card">
                    <div class="dashboard-card-icon">📡</div>
                    <div class="dashboard-card-content">
                        <div class="dashboard-card-title">台南廠</div>
                        <div class="dashboard-card-desc">善化區 CAN090</div>
                    </div>
                    <div class="dashboard-card-arrow">→</div>
                </a>

                <!-- 台中廠儀表板(預留)-->
                <a href="OPTC.html" class="dashboard-card">
                    <div class="dashboard-card-icon">📡</div>
                    <div class="dashboard-card-content">
                        <div class="dashboard-card-title">台中廠</div>
                        <div class="dashboard-card-desc">西屯 C0F9T0</div>
                    </div>
                    <div class="dashboard-card-arrow">→</div>
                </a>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 康寧台灣. 版權所有</p>
        </div>
    </div>
</body>
</html>
